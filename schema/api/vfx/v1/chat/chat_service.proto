syntax = "proto3";

package vfx.v1.chat;

import "google/protobuf/timestamp.proto";

// ChatService は 1 対 1 の DM と、グループ単位のチャンネルチャットを提供する。
//
// チャンネルは group をそのまま使う (channel_id = group の id)。送受信はそのグループのメンバーに限る。
// 履歴は新しい順で、before カーソル (その時刻より古いもの) + limit でページングする。
service ChatService {
  // SendDirectMessage は相手に DM を送り、保存されたメッセージを返す。
  rpc SendDirectMessage(SendDirectMessageRequest) returns (SendDirectMessageResponse);

  // ListDirectMessages は相手との会話履歴を新しい順で返す。
  rpc ListDirectMessages(ListDirectMessagesRequest) returns (ListDirectMessagesResponse);

  // SendChannelMessage はチャンネル (グループ) にメッセージを送る。送信者はそのグループのメンバーである必要がある。
  rpc SendChannelMessage(SendChannelMessageRequest) returns (SendChannelMessageResponse);

  // ListChannelMessages はチャンネルの履歴を新しい順で返す。メンバー限定。
  rpc ListChannelMessages(ListChannelMessagesRequest) returns (ListChannelMessagesResponse);
}

// ChannelMessage はチャンネル (グループ) の 1 メッセージ。
message ChannelMessage {
  string id = 1;
  string channel_id = 2;
  string sender_id = 3;
  string body = 4;
  google.protobuf.Timestamp sent_at = 5;
}

message SendChannelMessageRequest {
  string channel_id = 1;
  string body = 2;
}

message SendChannelMessageResponse {
  ChannelMessage message = 1;
}

message ListChannelMessagesRequest {
  string channel_id = 1;
  google.protobuf.Timestamp before = 2;
  int32 limit = 3;
}

message ListChannelMessagesResponse {
  repeated ChannelMessage messages = 1;
}

// Message は 1 通の DM。
message Message {
  string id = 1;
  string sender_id = 2;
  string recipient_id = 3;
  string body = 4;
  google.protobuf.Timestamp sent_at = 5;
}

message SendDirectMessageRequest {
  string recipient_id = 1;
  string body = 2;
}

message SendDirectMessageResponse {
  Message message = 1;
}

message ListDirectMessagesRequest {
  // 会話相手。
  string other_player_id = 1;

  // 任意。この時刻より前 (古い) のメッセージを返す。未指定なら最新から。
  google.protobuf.Timestamp before = 2;

  // 取得件数。0 はサーバ既定値、上限はサーバ側でクランプ。
  int32 limit = 3;
}

message ListDirectMessagesResponse {
  // 新しい順。
  repeated Message messages = 1;
}
