syntax = "proto3";

package vfx.v1.group;

import "google/protobuf/timestamp.proto";

// GroupService はプレイヤーが作るグループ (クラン/ギルド等) を提供する。
//
// 作成者が owner かつ最初のメンバー。owner は LeaveGroup できず、DeleteGroup で解散する。
// メンバー一覧の閲覧はメンバーに限る。
service GroupService {
  rpc CreateGroup(CreateGroupRequest) returns (CreateGroupResponse);

  // DeleteGroup は owner だけが実行でき、グループとメンバーシップを解散する。
  rpc DeleteGroup(DeleteGroupRequest) returns (DeleteGroupResponse);

  // JoinGroup はグループに参加する。冪等。
  rpc JoinGroup(JoinGroupRequest) returns (JoinGroupResponse);

  // LeaveGroup はメンバーシップを抜ける。owner は不可 (DeleteGroup を使う)。
  rpc LeaveGroup(LeaveGroupRequest) returns (LeaveGroupResponse);

  // ListMyGroups は自分が属するグループを返す。
  rpc ListMyGroups(ListMyGroupsRequest) returns (ListMyGroupsResponse);

  // ListMembers はグループのメンバーを返す。呼び出し元がメンバーである必要がある。
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
}

message Group {
  string id = 1;
  string name = 2;
  string owner_id = 3;
  google.protobuf.Timestamp founded_at = 4;
}

message Member {
  string player_id = 1;
  optional string nickname = 2;
  google.protobuf.Timestamp joined_at = 3;
}

message CreateGroupRequest {
  string name = 1;
}

message CreateGroupResponse {
  Group group = 1;
}

message DeleteGroupRequest {
  string group_id = 1;
}

message DeleteGroupResponse {}

message JoinGroupRequest {
  string group_id = 1;
}

message JoinGroupResponse {}

message LeaveGroupRequest {
  string group_id = 1;
}

message LeaveGroupResponse {}

message ListMyGroupsRequest {}

message ListMyGroupsResponse {
  repeated Group groups = 1;
}

message ListMembersRequest {
  string group_id = 1;
}

message ListMembersResponse {
  repeated Member members = 1;
}
