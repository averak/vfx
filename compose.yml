services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vfx
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: vfx
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vfx -d vfx"]
      interval: 5s
      timeout: 3s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--save", "60", "1", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Local stand-in for Google Cloud Storage; the storage services issue signed URLs against it.
  # -scheme http and a fixed public host make the signed URLs the client receives point back here.
  fake-gcs:
    image: fsouza/fake-gcs-server:1.52.2
    command:
      - "-scheme"
      - "http"
      - "-port"
      - "4443"
      - "-public-host"
      - "localhost:4443"
      - "-external-url"
      - "http://localhost:4443"
    ports:
      - "4443:4443"

volumes:
  postgres-data:
  valkey-data:
