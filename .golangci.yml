version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - copyloopvar
    - depguard
    - dupl
    - errorlint
    - exhaustive
    - gocritic
    - goconst
    - gosec
    - misspell
    - nilerr
    - nolintlint
    - prealloc
    - revive
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - hugeParam
        - rangeValCopy
    revive:
      rules:
        # `exported` requires every exported symbol to carry its own
        # comment. We document interfaces in domain/ but leave
        # implementations in infra/ uncommented because the contract is
        # already on the interface — duplicating it just drifts.
        - name: exported
          disabled: true
        - name: unused-parameter
          disabled: true
    exhaustive:
      default-signifies-exhaustive: true
    depguard:
      # Enforce the Clean Architecture dependency rule mechanically: the
      # domain depends on nothing inward of it and on no infrastructure
      # technology; the usecase layer depends on the ports it defines, not
      # on infra adapters. (Tests are excluded below — they legitimately
      # wire concrete adapters.)
      rules:
        domain:
          files:
            - "**/internal/domain/**"
          deny:
            - pkg: github.com/averak/vfx/internal/usecase
              desc: domain must not depend on the application layer
            - pkg: github.com/averak/vfx/internal/infra
              desc: domain must not depend on infrastructure
            - pkg: github.com/averak/vfx/internal/presentation
              desc: domain must not depend on the delivery layer
            - pkg: github.com/averak/vfx/internal/bootstrap
              desc: domain must not depend on the composition root
            - pkg: github.com/jackc/pgx
              desc: no persistence technology in the domain
            - pkg: github.com/valkey-io/valkey-go
              desc: no cache technology in the domain
            - pkg: github.com/prometheus
              desc: no metrics technology in the domain
            - pkg: agones.dev
              desc: no orchestrator technology in the domain
            - pkg: connectrpc.com
              desc: no transport technology in the domain
            - pkg: github.com/quic-go
              desc: no transport technology in the domain
            - pkg: go.opentelemetry.io
              desc: no telemetry technology in the domain
        usecase:
          files:
            - "**/internal/usecase/**"
          deny:
            - pkg: github.com/averak/vfx/internal/infra
              desc: usecase depends on the ports it defines, not infra adapters
            - pkg: github.com/averak/vfx/internal/presentation
              desc: usecase must not depend on the delivery layer
            - pkg: github.com/averak/vfx/internal/bootstrap
              desc: usecase must not depend on the composition root
            - pkg: github.com/jackc/pgx
              desc: usecase must not touch persistence technology directly
            - pkg: github.com/valkey-io/valkey-go
              desc: usecase must not touch cache technology directly
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - dupl
          - gosec
          - errcheck
          - exhaustive
          - depguard
      - path: gen/
        linters:
          - all
      - path: sdk/.+/gen/
        linters:
          - all

formatters:
  enable:
    - gofumpt
    - gci
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/averak/vfx)

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
