version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - copyloopvar
    - dupl
    - errorlint
    - exhaustive
    - gocritic
    - goconst
    - gosec
    - misspell
    - nilerr
    - nolintlint
    - prealloc
    - revive
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - hugeParam
        - rangeValCopy
    revive:
      rules:
        # `exported` requires every exported symbol to carry its own
        # comment. We document interfaces in domain/ but leave
        # implementations in infra/ uncommented because the contract is
        # already on the interface — duplicating it just drifts.
        - name: exported
          disabled: true
        - name: unused-parameter
          disabled: true
    exhaustive:
      default-signifies-exhaustive: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - dupl
          - gosec
          - errcheck
          - exhaustive
      - path: gen/
        linters:
          - all
      - path: sdk/.+/gen/
        linters:
          - all

formatters:
  enable:
    - gofumpt
    - gci
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/averak/vfx)

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
