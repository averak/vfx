version: v2

clean: true

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/averak/vfx/gen/go

inputs:
  - directory: schema/api

plugins:
  # Go: server, plugin SDK, client SDK
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt: paths=source_relative

  - remote: buf.build/connectrpc/go
    out: gen/go
    opt: paths=source_relative

  # TypeScript: client SDK
  - remote: buf.build/bufbuild/es
    out: sdk/client/ts/src/gen
    opt:
      - target=ts
      - import_extension=js

  - remote: buf.build/connectrpc/es
    out: sdk/client/ts/src/gen
    opt:
      - target=ts
      - import_extension=js
