version: v2

clean: true

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/averak/vfx/gen/go

inputs:
  - directory: schema/api

plugins:
  # Go: server, plugin SDK, client SDK
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt: paths=source_relative

  - remote: buf.build/connectrpc/go
    out: gen/go
    opt: paths=source_relative

  # vtprotobuf adds reflection-free MarshalVT / UnmarshalVT methods.
  # The WASM plugin guest (TinyGo) uses these because TinyGo cannot run
  # protobuf-go's reflection-based codec (reflect.NewAt panics).
  - remote: buf.build/community/planetscale-vtprotobuf
    out: gen/go
    opt:
      - paths=source_relative
      - features=marshal+unmarshal+size

  # TypeScript: client SDK.
  # protobuf-es v2 emits the service descriptor directly into *_pb.ts,
  # so connect-es v2 needs no separate codegen plugin — the client is
  # built with createClient(ServiceDesc, transport).
  - remote: buf.build/bufbuild/es:v2.12.0
    out: sdk/client/ts/src/gen
    opt:
      - target=ts
      - import_extension=js
