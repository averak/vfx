{{- if and .Values.gateway.enabled .Values.agones.enabled }}
{{- /* The Agones allocator creates GameServerAllocations through the
Kubernetes API, so the gateway needs a ServiceAccount bound to a Role
that permits exactly that — nothing more. */}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vfx.gatewayServiceAccountName" . }}
  labels:
    {{- include "vfx.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "vfx.gatewayServiceAccountName" . }}-allocator
  namespace: {{ .Values.agones.namespace | default .Release.Namespace }}
  labels:
    {{- include "vfx.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
rules:
  - apiGroups: ["allocation.agones.dev"]
    resources: ["gameserverallocations"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "vfx.gatewayServiceAccountName" . }}-allocator
  namespace: {{ .Values.agones.namespace | default .Release.Namespace }}
  labels:
    {{- include "vfx.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "vfx.gatewayServiceAccountName" . }}-allocator
subjects:
  - kind: ServiceAccount
    name: {{ include "vfx.gatewayServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
