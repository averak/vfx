{{- if .Values.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vfx.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "vfx.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "vfx.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: {{ include "vfx.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["migrate", "apply"]
          env:
            - name: DATABASE_URL
              value: {{ required "externalDatabase.url is required" .Values.externalDatabase.url | quote }}
{{- end }}
