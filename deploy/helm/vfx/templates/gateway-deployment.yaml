{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vfx.fullname" . }}-gateway
  labels:
    {{- include "vfx.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vfx.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "vfx.labels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
        {{- with .Values.gateway.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.gateway.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if (or .Values.agones.enabled (and .Values.storage.enabled .Values.storage.gcpServiceAccount)) }}
      serviceAccountName: {{ include "vfx.gatewayServiceAccountName" . }}
      {{- end }}
      containers:
        - name: gateway
          image: {{ include "vfx.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["gateway"]
          env:
            - name: VFX_GATEWAY_LISTEN_ADDR
              value: ":{{ .Values.gateway.service.port }}"
            - name: DATABASE_URL
              value: {{ required "externalDatabase.url is required" .Values.externalDatabase.url | quote }}
            - name: VALKEY_URL
              value: {{ required "externalValkey.url is required" .Values.externalValkey.url | quote }}
            - name: VFX_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "vfx.jwtSecretName" . }}
                  key: jwt-secret
            - name: VFX_GAME_MODES
              value: {{ join "," .Values.gateway.gameModes | quote }}
            - name: VFX_PLAYERS_PER_MATCH
              value: {{ .Values.gateway.playersPerMatch | quote }}
            {{- if .Values.agones.enabled }}
            - name: VFX_ALLOCATOR
              value: "agones"
            - name: VFX_AGONES_NAMESPACE
              value: {{ .Values.agones.namespace | default .Release.Namespace | quote }}
            {{- end }}
            {{- if .Values.storage.enabled }}
            - name: VFX_STORAGE_BUCKET
              value: {{ required "storage.bucket is required when storage.enabled" .Values.storage.bucket | quote }}
            - name: VFX_STORAGE_PLAYER_DATA_PREFIX
              value: {{ .Values.storage.playerDataPrefix | quote }}
            - name: VFX_STORAGE_TITLE_PREFIX
              value: {{ .Values.storage.titlePrefix | quote }}
            - name: VFX_STORAGE_URL_TTL
              value: {{ .Values.storage.urlTTL | quote }}
            - name: VFX_STORAGE_MAX_BYTES_PER_PLAYER
              value: {{ .Values.storage.maxBytesPerPlayer | quote }}
            - name: VFX_STORAGE_MAX_FILES_PER_PLAYER
              value: {{ .Values.storage.maxFilesPerPlayer | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
{{- end }}
