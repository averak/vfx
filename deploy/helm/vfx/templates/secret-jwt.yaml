{{- if not .Values.existingJwtSecretName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vfx.jwtSecretName" . }}
  labels:
    {{- include "vfx.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ required "jwtSecret is required (or set existingJwtSecretName to point at one you own)" .Values.jwtSecret | quote }}
{{- end -}}
